data_root: datasets/M3FD_Detection
split: train
image_size: [768, 1024]
num_classes: 6
batch_size: 1
epochs: 20
lr: 0.0001
use_sam: true
use_feedback: true
fusion_weight: 1.0
detection_weight: 1.0
ring_artifact_weight: 0.25
flat_smoothness_weight: 0.02
thermal_preserve_weight: 1.2
halo_artifact_weight: 0.25
texture_blur_kernel: 5
contrast_blur_kernel: 9
thermal_margin: 0.03
thermal_temperature: 18.0
gradient_overshoot_margin: 0.01
